{% extends "base.html" %} {% block content %}

<div class="relative z-10 w-full max-w-md mx-auto my-16">
  <div
    class="bg-surface rounded-xl p-8 md:p-12 shadow-soft border border-outline-variant"
  >
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center mb-4">
        <span
          class="material-symbols-outlined text-primary text-5xl"
          style="font-variation-settings: 'FILL' 1"
          >inventory_2</span
        >
      </div>
      <h1 class="text-3xl font-bold text-primary mb-1">PupiStock</h1>
      <p class="text-sm text-on-surface-variant">GESTIÓN DE INVENTARIO MINIMALISTA</p>
    </div>

    <form method="post" class="space-y-6" action="">
      {% csrf_token %}
      <div>
        <label for="id_username" class="block text-sm font-semibold mb-2"
          >Correo Electrónico o Usuario</label
        >
        <input
          id="id_username"
          name="username"
          type="text"
          required
          placeholder="ejemplo@sahara.com"
          class="w-full px-4 py-3.5 rounded-lg border"
        />
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label for="id_password" class="block text-sm font-semibold"
            >Contraseña</label
          >
          <a href="#" class="text-xs text-primary hover:underline"
            >¿Olvidaste tu contraseña?</a
          >
        </div>
        <div class="relative">
          <input
            id="id_password"
            name="password"
            type="password"
            required
            placeholder=""
            class="w-full px-4 py-3.5 rounded-lg border"
          />
          <button
            type="button"
            id="togglePass"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant"
          >
            🔒
          </button>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <input
          id="id_remember"
          name="remember"
          type="checkbox"
          class="w-5 h-5"
        />
        <label for="id_remember" class="text-sm text-on-surface-variant"
          >Mantener sesión iniciada</label
        >
      </div>

      <button
        type="submit"
        class="w-full py-3 bg-primary text-white rounded-lg font-bold"
      >
        Entrar al Almacén
      </button>
    </form>

    <div
      class="mt-6 pt-6 border-t border-outline-variant text-center"
    >
      <p class="text-sm text-on-surface-variant">
        ¿No tienes acceso?
        <a href="#" class="text-primary font-bold">Contacta a Administración</a>
      </p>
    </div>
  </div>
</div>

<script>
  (function () {
    const toggle = document.getElementById('togglePass');
    const pass = document.getElementById('id_password');
    if (toggle && pass) {
      toggle.addEventListener('click', () => {
        const t =
          pass.getAttribute('type') === 'password' ? 'text' : 'password';
        pass.setAttribute('type', t);
        toggle.textContent = t === 'password' ? '🔒' : '👁️';
      });
    }
  })();
</script>

{% endblock %}
