{% extends "base.html" %} {% block content %}
<div class="max-w-2xl mx-auto py-8">
  <h2 class="text-2xl font-semibold text-primary mb-4">Categorías</h2>
  <a
    class="inline-block mb-4 px-4 py-2 bg-primary text-white rounded"
    href="{% url 'category_create' %}"
    >+ Nueva Categoría</a
  >
  <ul class="divide-y">
    {% for c in categories %}
    <li class="flex justify-between items-center py-2">
      <span>{{ c.name }}</span>
      <a class="text-accent" href="{% url 'category_update' c.pk %}">Editar</a>
    </li>
    {% empty %}
    <li>No hay categorías.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
