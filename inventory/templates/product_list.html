{% extends "base.html" %} {% block content %}
<div class="max-w-2xl mx-auto py-8">
  <h2 class="text-2xl font-semibold text-primary mb-4">Productos</h2>
  <a
    class="inline-block mb-4 px-4 py-2 bg-primary text-white rounded"
    href="{% url 'product_create' %}"
    >+ Nuevo Producto</a
  >
  <form method="get" class="mb-4 flex flex-wrap gap-2">
    <input type="text" name="nombre" value="{{ filtros.nombre }}" placeholder="Nombre" class="border p-1 rounded">
    <select name="categoria" class="border p-1 rounded">
      <option value="">Categorías</option>
      {% for cat in categories %}
      <option value="{{ cat.id }}" {% if filtros.categoria|default_if_none:""|stringformat:"s" == cat.id|stringformat:"s" %}selected{% endif %}>{{ cat.name }}
      </option>
      {% endfor %}
    </select>
    <input type="number" name="min_stock" value="{{ filtros.min_stock }}" placeholder="Stock mínimo"
      class="border p-1 w-32 rounded">
    <input type="number" name="max_stock" value="{{ filtros.max_stock }}" placeholder="Stock máximo"
      class="border p-1 w-32 rounded">
    <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded">Filtrar</button>
  </form>
  <ul class="divide-y">
    {% for p in products %}
    <li class="flex flex-col sm:flex-row sm:justify-between py-2">
      <div>
        <span class="font-bold">{{ p.name }}</span>
        <span class="ml-2 text-gray-700">| {{ p.category }}</span>
      </div>
      <div>
        <span class="mr-2">Stock: {{ p.quantity }}</span>
        <a class="text-accent ml-2" href="{% url 'product_update' p.pk %}"
          >Editar</a
        >
      </div>
    </li>
    {% empty %}
    <li>No hay productos.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
